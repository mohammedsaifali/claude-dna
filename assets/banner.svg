<svg xmlns="http://www.w3.org/2000/svg" width="900" height="320" viewBox="0 0 900 320">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#110a24"/>
      <stop offset="40%" style="stop-color:#1e1040"/>
      <stop offset="100%" style="stop-color:#150d30"/>
    </linearGradient>
    <linearGradient id="bar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="33%" style="stop-color:#a855f7"/>
      <stop offset="66%" style="stop-color:#e879f9"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <linearGradient id="dna1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#a855f7"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <linearGradient id="dna2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#c084fc"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
    <linearGradient id="sparkle" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e9d5ff"/>
      <stop offset="100%" style="stop-color:#c084fc"/>
    </linearGradient>
    <filter id="glow-soft">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="banner-clip">
      <rect width="900" height="314" rx="12"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="900" height="314" rx="12" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g opacity="0.04" clip-path="url(#banner-clip)">
    <line x1="0" y1="60" x2="900" y2="60" stroke="white" stroke-width="0.5"/>
    <line x1="0" y1="120" x2="900" y2="120" stroke="white" stroke-width="0.5"/>
    <line x1="0" y1="180" x2="900" y2="180" stroke="white" stroke-width="0.5"/>
    <line x1="0" y1="240" x2="900" y2="240" stroke="white" stroke-width="0.5"/>
    <line x1="150" y1="0" x2="150" y2="320" stroke="white" stroke-width="0.5"/>
    <line x1="300" y1="0" x2="300" y2="320" stroke="white" stroke-width="0.5"/>
    <line x1="450" y1="0" x2="450" y2="320" stroke="white" stroke-width="0.5"/>
    <line x1="600" y1="0" x2="600" y2="320" stroke="white" stroke-width="0.5"/>
    <line x1="750" y1="0" x2="750" y2="320" stroke="white" stroke-width="0.5"/>
  </g>

  <!-- Background glow behind logo -->
  <circle cx="105" cy="130" r="85" fill="#7c3aed" opacity="0.1"/>
  <circle cx="105" cy="130" r="50" fill="#a855f7" opacity="0.06"/>

  <!-- === LOGO: Claude sparkle extracting DNA helix === -->
  <g transform="translate(42, 58)">

    <!-- Claude sparkle -->
    <g filter="url(#glow-soft)">
      <path d="M 38 8 L 43 50 L 38 92 L 33 50 Z" fill="url(#sparkle)" opacity="0.95"/>
      <path d="M 8 50 L 33 45 L 58 50 L 33 55 Z" fill="url(#sparkle)" opacity="0.95"/>
      <circle cx="38" cy="50" r="5.5" fill="white" opacity="0.9"/>
      <circle cx="38" cy="50" r="2.5" fill="white"/>
      <path d="M 18 22 L 21 28 L 18 34 L 15 28 Z" fill="#c084fc" opacity="0.5"/>
      <path d="M 56 68 L 59 74 L 56 80 L 53 74 Z" fill="#c084fc" opacity="0.4"/>
    </g>

    <!-- Extraction particles -->
    <g opacity="0.6">
      <circle cx="68" cy="44" r="2" fill="#c084fc" opacity="0.8"/>
      <circle cx="75" cy="38" r="1.5" fill="#a855f7" opacity="0.7"/>
      <circle cx="83" cy="48" r="2.2" fill="#c084fc" opacity="0.6"/>
      <circle cx="72" cy="56" r="1.8" fill="#e9d5ff" opacity="0.5"/>
      <circle cx="80" cy="60" r="1.2" fill="#a855f7" opacity="0.7"/>
      <circle cx="77" cy="32" r="1" fill="#e9d5ff" opacity="0.6"/>
      <circle cx="85" cy="54" r="1.6" fill="#c084fc" opacity="0.5"/>
    </g>

    <!-- DNA double helix -->
    <g transform="translate(82, 0)" filter="url(#glow-soft)">
      <path d="M 10 6 C 26 17, 26 30, 10 42 C -6 54, -6 67, 10 78 C 26 90, 26 103, 10 115"
            fill="none" stroke="url(#dna1)" stroke-width="3" stroke-linecap="round"/>
      <path d="M 24 6 C 8 17, 8 30, 24 42 C 40 54, 40 67, 24 78 C 8 90, 8 103, 24 115"
            fill="none" stroke="url(#dna2)" stroke-width="3" stroke-linecap="round"/>

      <!-- Base pair rungs -->
      <line x1="14" y1="12" x2="20" y2="12" stroke="#e9d5ff" stroke-width="1.8" stroke-linecap="round" opacity="0.7"/>
      <line x1="7" y1="24" x2="27" y2="24" stroke="#e9d5ff" stroke-width="1.8" stroke-linecap="round" opacity="0.6"/>
      <line x1="5" y1="37" x2="29" y2="37" stroke="#e9d5ff" stroke-width="1.8" stroke-linecap="round" opacity="0.7"/>
      <line x1="10" y1="49" x2="24" y2="49" stroke="#e9d5ff" stroke-width="1.8" stroke-linecap="round" opacity="0.5"/>
      <line x1="5" y1="61" x2="29" y2="61" stroke="#e9d5ff" stroke-width="1.8" stroke-linecap="round" opacity="0.7"/>
      <line x1="7" y1="73" x2="27" y2="73" stroke="#e9d5ff" stroke-width="1.8" stroke-linecap="round" opacity="0.6"/>
      <line x1="12" y1="85" x2="22" y2="85" stroke="#e9d5ff" stroke-width="1.8" stroke-linecap="round" opacity="0.5"/>
      <line x1="5" y1="97" x2="29" y2="97" stroke="#e9d5ff" stroke-width="1.8" stroke-linecap="round" opacity="0.7"/>
      <line x1="10" y1="109" x2="24" y2="109" stroke="#e9d5ff" stroke-width="1.8" stroke-linecap="round" opacity="0.6"/>

      <!-- Node dots -->
      <circle cx="10" cy="6" r="2.5" fill="#c084fc" opacity="0.9"/>
      <circle cx="24" cy="6" r="2.5" fill="#a855f7" opacity="0.9"/>
      <circle cx="10" cy="42" r="2.5" fill="#c084fc" opacity="0.8"/>
      <circle cx="24" cy="42" r="2.5" fill="#a855f7" opacity="0.8"/>
      <circle cx="10" cy="78" r="2.5" fill="#c084fc" opacity="0.7"/>
      <circle cx="24" cy="78" r="2.5" fill="#a855f7" opacity="0.7"/>
      <circle cx="10" cy="115" r="2" fill="#c084fc" opacity="0.5"/>
      <circle cx="24" cy="115" r="2" fill="#a855f7" opacity="0.5"/>
    </g>
  </g>

  <!-- Title -->
  <text x="220" y="115" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="52" font-weight="700" fill="white" letter-spacing="-1">claude-dna</text>

  <!-- Subtitle -->
  <text x="220" y="148" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="18" fill="#a5a3b5">Extract, export, and import your complete project DNA</text>

  <!-- Right side flow diagram -->
  <g transform="translate(600, 60)">
    <rect x="0" y="0" width="100" height="30" rx="7" fill="white" opacity="0.06" stroke="white" stroke-width="0.5" stroke-opacity="0.12"/>
    <text x="50" y="20" font-family="system-ui, sans-serif" font-size="11" fill="#b0adc0" text-anchor="middle">Your Project</text>

    <line x1="100" y1="15" x2="125" y2="15" stroke="#7c3aed" stroke-width="1.5" opacity="0.5"/>
    <polygon points="123,11 129,15 123,19" fill="#7c3aed" opacity="0.5"/>
    <text x="112" y="9" font-family="system-ui, sans-serif" font-size="8" fill="#8b5cf6" text-anchor="middle">extract</text>

    <rect x="129" y="0" width="80" height="30" rx="7" fill="#7c3aed" opacity="0.2" stroke="#7c3aed" stroke-width="1" stroke-opacity="0.4"/>
    <text x="169" y="20" font-family="system-ui, sans-serif" font-size="11" fill="#c4b5fd" text-anchor="middle" font-weight="600">dna.json</text>

    <line x1="209" y1="15" x2="234" y2="15" stroke="#7c3aed" stroke-width="1.5" opacity="0.5"/>
    <polygon points="232,11 238,15 232,19" fill="#7c3aed" opacity="0.5"/>
    <text x="221" y="9" font-family="system-ui, sans-serif" font-size="8" fill="#8b5cf6" text-anchor="middle">apply</text>

    <rect x="238" y="0" width="100" height="30" rx="7" fill="white" opacity="0.06" stroke="white" stroke-width="0.5" stroke-opacity="0.12"/>
    <text x="288" y="20" font-family="system-ui, sans-serif" font-size="11" fill="#b0adc0" text-anchor="middle">New Project</text>

    <rect x="238" y="42" width="100" height="30" rx="7" fill="white" opacity="0.04" stroke="white" stroke-width="0.5" stroke-opacity="0.08"/>
    <text x="288" y="62" font-family="system-ui, sans-serif" font-size="11" fill="#807d90" text-anchor="middle">Another One</text>

    <rect x="238" y="84" width="100" height="30" rx="7" fill="white" opacity="0.025" stroke="white" stroke-width="0.5" stroke-opacity="0.05"/>
    <text x="288" y="104" font-family="system-ui, sans-serif" font-size="11" fill="#5c5a6b" text-anchor="middle">And More...</text>

    <line x1="209" y1="30" x2="238" y2="57" stroke="#7c3aed" stroke-width="1" opacity="0.3"/>
    <line x1="209" y1="30" x2="238" y2="99" stroke="#7c3aed" stroke-width="1" opacity="0.2"/>
  </g>

  <!-- Tags row -->
  <g transform="translate(220, 175)">
    <rect x="0" y="0" width="130" height="26" rx="13" fill="#7c3aed" opacity="0.25"/>
    <rect x="0" y="0" width="130" height="26" rx="13" fill="none" stroke="#7c3aed" stroke-width="1" opacity="0.4"/>
    <text x="65" y="17" font-family="system-ui, sans-serif" font-size="11" fill="#c4b5fd" text-anchor="middle" font-weight="500">Claude Code Plugin</text>

    <rect x="142" y="0" width="100" height="26" rx="13" fill="#3b82f6" opacity="0.25"/>
    <rect x="142" y="0" width="100" height="26" rx="13" fill="none" stroke="#3b82f6" stroke-width="1" opacity="0.4"/>
    <text x="192" y="17" font-family="system-ui, sans-serif" font-size="11" fill="#93c5fd" text-anchor="middle" font-weight="500">9 Commands</text>

    <rect x="254" y="0" width="112" height="26" rx="13" fill="#f59e0b" opacity="0.25"/>
    <rect x="254" y="0" width="112" height="26" rx="13" fill="none" stroke="#f59e0b" stroke-width="1" opacity="0.4"/>
    <text x="310" y="17" font-family="system-ui, sans-serif" font-size="11" fill="#fcd34d" text-anchor="middle" font-weight="500">10 Categories</text>

    <rect x="378" y="0" width="120" height="26" rx="13" fill="#22c55e" opacity="0.25"/>
    <rect x="378" y="0" width="120" height="26" rx="13" fill="none" stroke="#22c55e" stroke-width="1" opacity="0.4"/>
    <text x="438" y="17" font-family="system-ui, sans-serif" font-size="11" fill="#86efac" text-anchor="middle" font-weight="500">0 Dependencies</text>
  </g>

  <!-- Bottom accent bar -->
  <rect y="310" width="900" height="10" fill="url(#bar)"/>
</svg>
