<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="300" viewBox="0 0 1200 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1040"/>
      <stop offset="50%" style="stop-color:#2d1b69"/>
      <stop offset="100%" style="stop-color:#1a0f3c"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="50%" style="stop-color:#a855f7"/>
      <stop offset="100%" style="stop-color:#c084fc"/>
    </linearGradient>
    <linearGradient id="bar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="33%" style="stop-color:#a855f7"/>
      <stop offset="66%" style="stop-color:#c084fc"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="296" rx="12" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.06">
    <line x1="0" y1="60" x2="1200" y2="60" stroke="white" stroke-width="0.5"/>
    <line x1="0" y1="120" x2="1200" y2="120" stroke="white" stroke-width="0.5"/>
    <line x1="0" y1="180" x2="1200" y2="180" stroke="white" stroke-width="0.5"/>
    <line x1="0" y1="240" x2="1200" y2="240" stroke="white" stroke-width="0.5"/>
    <line x1="200" y1="0" x2="200" y2="300" stroke="white" stroke-width="0.5"/>
    <line x1="400" y1="0" x2="400" y2="300" stroke="white" stroke-width="0.5"/>
    <line x1="600" y1="0" x2="600" y2="300" stroke="white" stroke-width="0.5"/>
    <line x1="800" y1="0" x2="800" y2="300" stroke="white" stroke-width="0.5"/>
    <line x1="1000" y1="0" x2="1000" y2="300" stroke="white" stroke-width="0.5"/>
  </g>

  <!-- Glow orb -->
  <circle cx="160" cy="148" r="80" fill="#7c3aed" opacity="0.15"/>
  <circle cx="160" cy="148" r="50" fill="#a855f7" opacity="0.1"/>

  <!-- DNA Helix icon -->
  <g transform="translate(110, 98)" filter="url(#glow)">
    <text font-size="80" fill="url(#accent)" font-family="Segoe UI Emoji, Apple Color Emoji, sans-serif">🧬</text>
  </g>

  <!-- Title -->
  <text x="280" y="135" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="56" font-weight="700" fill="white" letter-spacing="-1">claude-dna</text>

  <!-- Subtitle -->
  <text x="280" y="172" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="22" fill="#a5a3b5">Extract, export, and import your complete project DNA</text>

  <!-- Tags -->
  <g transform="translate(280, 200)">
    <!-- Claude Code Plugin -->
    <rect x="0" y="0" width="140" height="28" rx="14" fill="#7c3aed" opacity="0.3"/>
    <rect x="0" y="0" width="140" height="28" rx="14" fill="none" stroke="#7c3aed" stroke-width="1" opacity="0.5"/>
    <text x="70" y="18" font-family="system-ui, sans-serif" font-size="12" fill="#c4b5fd" text-anchor="middle" font-weight="500">Claude Code Plugin</text>

    <!-- 9 Commands -->
    <rect x="155" y="0" width="110" height="28" rx="14" fill="#3b82f6" opacity="0.3"/>
    <rect x="155" y="0" width="110" height="28" rx="14" fill="none" stroke="#3b82f6" stroke-width="1" opacity="0.5"/>
    <text x="210" y="18" font-family="system-ui, sans-serif" font-size="12" fill="#93c5fd" text-anchor="middle" font-weight="500">9 Commands</text>

    <!-- 10 Categories -->
    <rect x="280" y="0" width="120" height="28" rx="14" fill="#f59e0b" opacity="0.3"/>
    <rect x="280" y="0" width="120" height="28" rx="14" fill="none" stroke="#f59e0b" stroke-width="1" opacity="0.5"/>
    <text x="340" y="18" font-family="system-ui, sans-serif" font-size="12" fill="#fcd34d" text-anchor="middle" font-weight="500">10 Categories</text>

    <!-- 0 Dependencies -->
    <rect x="415" y="0" width="130" height="28" rx="14" fill="#22c55e" opacity="0.3"/>
    <rect x="415" y="0" width="130" height="28" rx="14" fill="none" stroke="#22c55e" stroke-width="1" opacity="0.5"/>
    <text x="480" y="18" font-family="system-ui, sans-serif" font-size="12" fill="#86efac" text-anchor="middle" font-weight="500">0 Dependencies</text>
  </g>

  <!-- Right side - flow diagram -->
  <g transform="translate(830, 85)">
    <rect x="0" y="0" width="120" height="36" rx="8" fill="white" opacity="0.08" stroke="white" stroke-width="0.5" stroke-opacity="0.15"/>
    <text x="60" y="23" font-family="system-ui, sans-serif" font-size="13" fill="#d4d0e0" text-anchor="middle">Your Project</text>

    <line x1="120" y1="18" x2="155" y2="18" stroke="#7c3aed" stroke-width="1.5" opacity="0.6"/>
    <text x="137" y="12" font-family="system-ui, sans-serif" font-size="9" fill="#a78bfa" text-anchor="middle">extract</text>

    <rect x="155" y="0" width="100" height="36" rx="8" fill="#7c3aed" opacity="0.25" stroke="#7c3aed" stroke-width="1" stroke-opacity="0.5"/>
    <text x="205" y="23" font-family="system-ui, sans-serif" font-size="13" fill="#c4b5fd" text-anchor="middle" font-weight="600">dna.json</text>

    <line x1="255" y1="18" x2="290" y2="18" stroke="#7c3aed" stroke-width="1.5" opacity="0.6"/>
    <text x="272" y="12" font-family="system-ui, sans-serif" font-size="9" fill="#a78bfa" text-anchor="middle">apply</text>

    <rect x="290" y="0" width="120" height="36" rx="8" fill="white" opacity="0.08" stroke="white" stroke-width="0.5" stroke-opacity="0.15"/>
    <text x="350" y="23" font-family="system-ui, sans-serif" font-size="13" fill="#d4d0e0" text-anchor="middle">New Project</text>

    <!-- Second row -->
    <rect x="290" y="55" width="120" height="36" rx="8" fill="white" opacity="0.08" stroke="white" stroke-width="0.5" stroke-opacity="0.15"/>
    <text x="350" y="78" font-family="system-ui, sans-serif" font-size="13" fill="#d4d0e0" text-anchor="middle">Another One</text>

    <line x1="255" y1="36" x2="290" y2="73" stroke="#7c3aed" stroke-width="1" opacity="0.4"/>
  </g>

  <!-- Bottom accent bar -->
  <rect y="292" width="1200" height="8" fill="url(#bar)" rx="0"/>
</svg>
